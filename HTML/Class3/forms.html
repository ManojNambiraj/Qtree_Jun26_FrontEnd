<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <h3>User Registeration</h3>

      <div>
        <label for="username">Username</label>
        <input type="text" id="username" />
      </div>

      <div>
        <label for="age">Age</label>
        <input type="number" id="age" />
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" />
      </div>

      <div>
        <label for="mobile">Mobile</label>
        <input type="number" id="mobile" />
      </div>

      <div>
        <label for="password">Password</label>
        <input type="password" id="password" />
      </div>

      <div>
        <label for="Gender">Gender</label><br />

        <input type="radio" id="male" name="Gender" /><label for="male"
          >male</label
        >
        <input type="radio" id="female" name="Gender" /><label for="female"
          >female</label
        >
      </div>

      <div>
        <label for="FavColor">FavColor</label><br />

        <input type="checkbox" id="Blue" /><label for="Blue">Blue</label>
        <input type="checkbox" id="Yellow" /><label for="Yellow">Yellow</label>
        <input type="checkbox" id="Red" /><label for="Red">Red</label>
        <input type="checkbox" id="Green" /><label for="Green">Green</label>
        <input type="checkbox" id="Pink" /><label for="Pink">Pink</label>
        <input type="checkbox" id="Violet" /><label for="Violet">Violet</label>
      </div>

      <div>
        <label for="Resume">Upload your Resume:</label>

        <input type="file" id="Resume" />
      </div>

      <div>
        <label for="DOB">DOB</label>

        <input type="date" id="DOB" />
      </div>

      <div>
        <label for="TOB">TOB</label>

        <input type="time" />
      </div>

      <div>
        <label for="Car">Car</label>
        <select id="Car">
          <option value="" selected disabled>--Select--</option>
          <option value="BMW">BMW</option>
          <option value="Volvo">Volvo</option>
          <option value="Ferrari">Ferrari</option>
          <option value="Hyundai">Hyundai</option>
        </select>
      </div>

      <div>
        <label for="Address">Address</label>

        <textarea id="Address" rows="5" cols="50"></textarea>
      </div>

      <button>Cancel</button>
      <input type="button" value="Reset">
      <input type="submit">

    </form>
  </body>
</html>
